<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Club Mode — Admin Panel</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://toplidercoach.com/config.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/body-muscles@latest/dist/umd/body-muscles.umd.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/club-admin.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
    <div class="header-left">
        <div class="header-logo">C</div>
        <h1>Club Mode<span>Admin Panel</span></h1>
    </div>
    <div class="header-right">
        <div class="hc"><span class="hd"></span><span id="h-club">—</span></div>
        <div class="hu" id="h-user">—</div>
    </div>
</div>

<!-- CONTENIDO PRINCIPAL -->
<div class="ct">
    <div id="no-login" class="card" style="display:none">
        <div class="card-body" style="text-align:center;padding:60px">
            <p style="color:#f87171;font-size:15px;font-weight:600">Sin sesion activa</p>
            <p style="color:var(--tm);font-size:13px;margin-top:8px">Abre primero el HUB (index.html) e inicia sesion.</p>
        </div>
    </div>

    <div id="main-content" style="display:none">
        <div class="sb">
            <div class="sc"><div class="sl">Equipos</div><div class="sv2" id="s-eq">0</div></div>
            <div class="sc"><div class="sl">Jugadores</div><div class="sv2" id="s-jg">0</div></div>
            <div class="sc"><div class="sl">Staff</div><div class="sv2" id="s-mb">0</div></div>
        </div>

        <div class="tabs" id="main-tabs">
            <button class="tab active" onclick="nav('equipos',this)">Equipos <span class="tc" id="tc-eq">0</span></button>
            <button class="tab" onclick="nav('jugadores',this)">Jugadores <span class="tc" id="tc-jg">0</span></button>
            <button class="tab" onclick="nav('cargos',this)">Cargos <span class="tc" id="tc-cg">0</span></button>
            <button class="tab" onclick="nav('miembros',this)">Miembros <span class="tc" id="tc-mb">0</span></button>
            <button class="tab" onclick="nav('medico',this)">Medico</button>
        </div>

        <div id="sec-equipos" class="section active"></div>
        <div id="sec-team-detail" class="section"></div>
        <div id="sec-jugadores" class="section"></div>
        <div id="sec-player-profile" class="section"></div>
        <div id="sec-cargos" class="section"></div>
        <div id="sec-miembros" class="section"></div>
        <div id="sec-medico" class="section"></div>
    </div>
</div>

<div id="modals-container"></div>
<div class="toast" id="toast-el"></div>

<script src="js/club-admin-core.js"></script>
<script src="js/club-charts.js"></script>
<script src="js/club-admin-equipos.js"></script>
<script src="js/club-admin-jugadores.js"></script>
<script src="js/club-admin-cargos.js"></script>
<script src="js/club-admin-miembros.js"></script>
<script src="js/club-admin-medico.js"></script>

</body>
</html>
